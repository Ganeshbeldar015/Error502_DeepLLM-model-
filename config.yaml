# Offroad Segmentation Configuration File
# ------------------------------------------------------
# Training Parameters
# ------------------------------------------------------
training:
  epochs: 1
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.0
  num_classes: 10
  image_size: [512, 512]
  device: "auto"  # "auto" = cuda if available, else cpu

# ------------------------------------------------------
# Data Paths
# ------------------------------------------------------
data:
  train:
    images: "../data/train/images"
    masks: "../data/train/masks"
  val:
    images: "../data/val/images"
    masks: "../data/val/masks"
  test:
    images: "../data/test/images"
    masks: "../data/test/masks"

# ------------------------------------------------------
# Model Configuration
# ------------------------------------------------------
model:
  architecture: "deeplabv3_resnet50"
  pretrained: true
  output_stride: 16

# ------------------------------------------------------
# DataLoader Settings
# ------------------------------------------------------
dataloader:
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

# ------------------------------------------------------
# Optimizer & Scheduler
# ------------------------------------------------------
optimizer:
  type: "Adam"
  lr_scheduler: "ReduceLROnPlateau"
  scheduler_factor: 0.5
  scheduler_patience: 2

# ------------------------------------------------------
# Loss Function
# ------------------------------------------------------
loss:
  type: "CrossEntropyLoss"

# ------------------------------------------------------
# Visualization & Evaluation
# ------------------------------------------------------
evaluation:
  batch_size: 12
  num_workers: 2
  downsample_for_map: true
  downsample_size: [128, 128]

visualization:
  num_images: 5

